<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Celebration of Life | Cynthia Tawiah</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0d0d0d;
      font-family:"Segoe UI",sans-serif;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      color:white;
    }

    .viewer-wrapper{
      width:95%;
      height:95vh;
      background:#111;
      border-radius:20px;
      overflow:hidden;
      position:relative;
      border:1px solid rgba(201,163,78,0.3);
      box-shadow:0 0 40px rgba(0,0,0,0.7);
    }

    .top-bar{
      width:100%;
      height:75px;
      background:#111;
      border-bottom:1px solid rgba(201,163,78,0.2);

      display:flex;
      justify-content:space-between;
      align-items:center;

      padding:0 25px;

      position:absolute;
      top:0;
      left:0;
      z-index:10;
    }

    .title-area{
      display:flex;
      flex-direction:column;
    }

    .main-title{
      color:#c9a34e;
      font-size:20px;
      font-weight:700;
      letter-spacing:2px;
      text-transform:uppercase;
    }

    .sub-title{
      color:#d6d6d6;
      font-size:12px;
      margin-top:4px;
      letter-spacing:1px;
    }

    .button-group{
      display:flex;
      gap:12px;
    }

    .btn{
      text-decoration:none;
      padding:10px 18px;
      border-radius:30px;
      font-size:14px;
      font-weight:600;
      transition:0.3s ease;
    }

    .download-btn{
      background:#c9a34e;
      color:#0d0d0d;
    }

    .download-btn:hover{
      opacity:0.85;
    }

    .fullscreen-btn{
      border:1px solid #c9a34e;
      color:#c9a34e;
      background:transparent;
    }

    .fullscreen-btn:hover{
      background:#c9a34e;
      color:#111;
    }

    .pdf-container{
      width:100%;
      height:100%;
      padding-top:75px;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
    }

    .footer-note{
      position:absolute;
      bottom:12px;
      left:50%;
      transform:translateX(-50%);
      font-size:11px;
      color:#999;
      letter-spacing:1px;
      z-index:20;
    }

    @media(max-width:768px){

      .top-bar{
        padding:0 15px;
      }

      .main-title{
        font-size:14px;
      }

      .sub-title{
        font-size:10px;
      }

      .btn{
        padding:8px 12px;
        font-size:11px;
      }

      .button-group{
        gap:8px;
      }

    }

  </style>
</head>

<body>

  <div class="viewer-wrapper">

    <div class="top-bar">

      <div class="title-area">
        <div class="main-title">
          Celebration of Life
        </div>

        <div class="sub-title">
          In Loving Memory of Cynthia Tawiah
        </div>
      </div>

      <div class="button-group">

        <a class="btn download-btn"
           href="BRO%20BOOK.pdf"
           download>
           Download PDF
        </a>

        <a class="btn fullscreen-btn"
           href="https://mozilla.github.io/pdf.js/web/viewer.html?file=BRO%20BOOK.pdf#page=1&zoom=page-width&spread=even"
           target="_blank">
           Fullscreen
        </a>

      </div>

    </div>

    <div class="pdf-container">

      <iframe
        src="https://mozilla.github.io/pdf.js/web/viewer.html?file=BRO%20BOOK.pdf#page=1&zoom=page-width&spread=even"
        allowfullscreen>
      </iframe>

    </div>

    <div class="footer-note">
      FOREVER IN OUR HEARTS
    </div>

  </div>

</body>
</html>
